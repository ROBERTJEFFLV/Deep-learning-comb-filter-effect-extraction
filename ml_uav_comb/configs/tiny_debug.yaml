experiment:
  name: uav_comb_tiny_debug_v2
  seed: 7

audio:
  target_sr: 48000
  n_fft: 512
  hop_len: 128
  freq_min: 1000
  freq_max: 5000
  max_duration_sec: 12.0

front_end:
  history_frames: 18
  smooth_sigma_1: 2.2
  smooth_sigma_2: 30.0
  d1_amp_scale: 900.0
  sound_threshold: 0.005
  noise_gate_enabled: true
  noise_gate_threshold: 0.01
  noise_gate_smooth: 0.9
  amp_threshold: 0.25
  sum_abs_smooth_len: 300
  k_compare: 30
  trend_n: 6
  trend_min_votes: 1
  dir_window_size: 20
  dir_vote_threshold: 10
  comb_max_lag: 16
  comb_rho_thresh: 0.5
  window_size: 68
  window_hop: 34
  window_pick: 11
  gaussian_sigma_window: 6.0
  fit_d_min_m: 0.005
  fit_oversample: 8.0
  fit_gaussian_sigma: 6.0
  local_radius_first: 3
  local_radius_segment: 1
  missing_threshold_sec: 1.0
  min_amplitude: 0.25

kf:
  R: 4.0
  sigma_a: 8.0
  v_max: 8.0
  a_max: 25.0
  lag: 3

features:
  use_stpacc: true
  stp_n_fft: 2048
  stp_hop_length: 128
  stp_downsample_bins: 64
  acoustic_scalar_fields:
    - sum_abs_d1_smooth
    - comb_shift_lag
    - comb_shift_rho
    - is_sound_present
  teacher_only_fields:
    - heuristic_distance_raw_cm
    - heuristic_distance_kf_cm
    - heuristic_distance_raw_available
    - heuristic_distance_kf_available
    - velocity_kf_cm_s
    - acceleration_kf_cm_s2
    - heuristic_measure_available
    - shift_direction_raw
    - shift_direction_hysteresis

dataset:
  build_jobs: 2
  cache_dir: ml_uav_comb/cache/tiny_debug_v2
  index_path: ml_uav_comb/cache/tiny_debug_v2/dataset_index.csv
  normalization_path: ml_uav_comb/cache/tiny_debug_v2/normalization_stats.npz
  meta_path: ml_uav_comb/cache/tiny_debug_v2/dataset_index_meta.json
  recordings:
    - recording_id: rec_1
      audio_path: rec_1.wav
      label_path: range_1.csv
      label_format: csv
      split_hint: auto
    - recording_id: recorded_audio
      audio_path: recorded_audio.wav
      label_path: null
      label_format: null
      split_hint: exclude
  window_sec: 0.64
  stride_sec: 0.0853333333
  split_margin_sec: 0.64
  split_ratio_single: [0.7, 0.15, 0.15]
  split_names: [train, val, test]
  target_space: raw
  gt_motion_eps_cm_per_sec: 1.0
  local_fit_half_window_sec: 0.32
  local_fit_min_points: 5
  local_fit_max_rmse_cm: 2.5
  supervision_mode: strict_gt
  window_anchor: trailing
  target_position: window_end
  allow_derived_sign_train: false
  allow_pseudo_confidence_train: false
  use_physics_gate_as_distance_mask: false
  use_physics_gate_as_distance_weight: true
  default_distance_valid_when_missing: true
  default_sign_annotated_when_missing: false
  distance_weight_floor: 0.25
  distance_weight_reliable: 1.0

model:
  model_type: distance_grid_tcn_observer
  num_candidates: 64
  distance_grid_cm_min: 20.0
  distance_grid_cm_max: 300.0
  distance_grid_mode: uniform
  distance_target_sigma_cm: 12.0
  phase_branch_channels: [16, 32]
  comb_branch_channels: [16, 32]
  stp_branch_channels: [8, 16]
  scalar_hidden: 32
  phase_out_dim: 64
  comb_out_dim: 64
  scalar_out_dim: 32
  stp_out_dim: 32
  tcn_channels: [128, 128, 128, 128]
  tcn_kernel_size: 3
  tcn_dilations: [1, 2, 4, 8]
  tcn_dropout: 0.1
  dropout: 0.1
  sign_classes: 3

filter:
  enabled: true
  validity_threshold: 0.5
  invalid_R_scale: 25.0
  entropy_R_scale: 4.0
  margin_R_scale: 2.0
  min_R: 1.0
  max_R: 10000.0
  skip_update_when_invalid: true

training:
  batch_size: 2
  num_workers: 0
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2
  non_blocking_to_device: true
  use_amp: true
  amp_dtype: bfloat16
  allow_tf32: true
  use_torch_compile: false
  torch_compile_mode: reduce-overhead
  cudnn_benchmark: true
  max_cache_files_per_worker: 2
  batch_sampler_mode: plain
  max_samples_per_recording_per_batch: 2
  chunk_step: 0
  min_chunk_span_cm: 0.0
  min_chunk_valid_fraction: 0.75
  group_batches_by_recording: false
  shuffle_within_recording: false
  drop_last_train_batch: true
  compile_warmup_train: true
  compile_warmup_eval: true
  log_interval_steps: 10
  log_warmup_steps: 5
  learning_rate: 0.001
  weight_decay: 0.0
  stage_a_epochs: 1
  stage_b_epochs: 1
  grad_clip_norm: 5.0
  lambda_likelihood_ce: 1.0
  lambda_measurement_mean: 0.3
  lambda_measurement_validity: 0.3
  target_space: raw
  teacher_consistency_weight: 0.0
  teacher_conf_threshold: 0.8
  checkpoint_dir: ml_uav_comb/artifacts/tiny_debug_v2

evaluation:
  prediction_csv: ml_uav_comb/artifacts/tiny_debug_v2/eval_predictions.csv

inference:
  prediction_csv: ml_uav_comb/artifacts/tiny_debug_v2/infer_predictions.csv
