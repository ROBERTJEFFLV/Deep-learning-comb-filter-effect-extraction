experiment:
  name: uav_comb_rir_runs_global
  seed: 7
audio:
  target_sr: 48000
  n_fft: 512
  hop_len: 128
  freq_min: 1000
  freq_max: 5000
  max_duration_sec: null
front_end:
  history_frames: 18
  smooth_sigma_1: 2.2
  smooth_sigma_2: 30.0
  d1_amp_scale: 900.0
  sound_threshold: 0.005
  noise_gate_enabled: true
  noise_gate_threshold: 0.01
  noise_gate_smooth: 0.9
  amp_threshold: 0.25
  sum_abs_smooth_len: 300
  k_compare: 30
  trend_n: 6
  trend_min_votes: 1
  dir_window_size: 20
  dir_vote_threshold: 10
  comb_max_lag: 16
  comb_rho_thresh: 0.5
  window_size: 68
  window_hop: 34
  window_pick: 11
  gaussian_sigma_window: 6.0
  fit_d_min_m: 0.005
  fit_oversample: 8.0
  fit_gaussian_sigma: 6.0
  local_radius_first: 3
  local_radius_segment: 1
  missing_threshold_sec: 1.0
  min_amplitude: 0.25
kf:
  R: 4.0
  sigma_a: 8.0
  v_max: 8.0
  a_max: 25.0
  lag: 3
features:
  use_stpacc: true
  stp_n_fft: 2048
  stp_hop_length: 128
  stp_downsample_bins: 64
  acoustic_scalar_fields:
  - sum_abs_d1_smooth
  - comb_shift_lag
  - comb_shift_rho
  - is_sound_present
  teacher_only_fields:
  - heuristic_distance_raw_cm
  - heuristic_distance_kf_cm
  - heuristic_distance_raw_available
  - heuristic_distance_kf_available
  - velocity_kf_cm_s
  - acceleration_kf_cm_s2
  - heuristic_measure_available
  - shift_direction_raw
  - shift_direction_hysteresis
dataset:
  build_jobs: 16
  cache_dir: ml_uav_comb/cache/rir_runs_global
